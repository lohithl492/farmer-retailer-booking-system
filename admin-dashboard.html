<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="frontend/css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation -->
        <nav class="dashboard-nav">
            <div class="logo">⚙️ Admin Dashboard</div>
            <div class="nav-right">
                <span class="user-info">👨‍💼 Admin</span>
                <button onclick="logout()" class="btn btn-logout">Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h3>Menu</h3>
                <ul>
                    <li><a href="#" onclick="showSection('statistics')" class="active">📊 Statistics</a></li>
                    <li><a href="#" onclick="showSection('pending-approvals')">⏳ Pending Approvals</a></li>
                    <li><a href="#" onclick="showSection('all-users')">👥 All Users</a></li>
                </ul>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Statistics Section -->
                <section id="statistics" class="section active">
                    <h2>📊 Platform Statistics</h2>
                    <div id="stats-container" class="stats-grid">
                        <p class="loading">Loading statistics...</p>
                    </div>
                </section>

                <!-- Pending Approvals Section -->
                <section id="pending-approvals" class="section">
                    <h2>⏳ Pending User Approvals</h2>
                    <div id="pending-list">
                        <p class="loading">Loading pending approvals...</p>
                    </div>
                </section>

                <!-- All Users Section -->
                <section id="all-users" class="section">
                    <h2>👥 All Users</h2>
                    <div id="users-list">
                        <p class="loading">Loading users...</p>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
