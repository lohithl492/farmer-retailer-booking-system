<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/retailer.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation -->
        <nav class="dashboard-nav">
            <div class="logo">🛒 Retailer Dashboard</div>
            <div class="nav-right">
                <span id="retailer-name" class="user-info"></span>
                <button onclick="logout()" class="btn btn-logout">Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h3>Menu</h3>
                <ul>
                    <li><a href="#" onclick="showSection('browse-crops')" class="active">🛒 Browse Crops</a></li>
                    <li><a href="#" onclick="showSection('my-bookings')">📦 My Bookings</a></li>
                </ul>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Browse Crops Section -->
                <section id="browse-crops" class="section active">
                    <h2>🛒 Browse Crops from Farmers</h2>
                    <div class="search-section">
                        <input type="text" id="search-crops" placeholder="Search crops by name...">
                        <button onclick="searchCrops()" class="btn btn-primary">🔍 Search</button>
                    </div>
                    <div id="crops-list" class="crops-grid">
                        <p class="loading">Loading crops...</p>
                    </div>
                </section>

                <!-- My Bookings Section -->
                <section id="my-bookings" class="section">
                    <h2>📦 Your Bookings</h2>
                    <div id="bookings-list">
                        <p class="loading">Loading your bookings...</p>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/retailer.js"></script>
</body>
</html>
